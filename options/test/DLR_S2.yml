# network structures
network_g:
  type: Transformer_DLR
  inp_channels: 3
  out_channels: 3
  dim: 32
  num_blocks: [2,2,4,4]
  num_refinement_blocks: 1
  heads: [1,1,2,2]    
  ffn_expansion_factor: 2.66
  bias: False
  LayerNorm_type: WithBias
  dual_pixel_task: False
  embed_dim: 64
  type_embed_dim: 32
  group: 4 # N=4*4
  with_contra: False
  with_region_restoration_head: False


network_sp:
  type: spatial_prior_encoder_gelu
  in_chans: 3
  embed_dim: 32 # same as above
  block_num: 4
  group: 4 # same as above
  stage: 1
  patch_expansion: 0.5
  channel_expansion: 4

network_cp:
  type: channel_prior_encoder_gelu
  in_chans: 6
  embed_dim: 64 # same as above
  block_num: 6
  group: 4 # same as above
  stage: 1
  patch_expansion: 0.5
  channel_expansion: 4

network_dm:
  type: denoising
  in_channel: 256 # (embed_dim*4)
  out_channel: 256 # (embed_dim*4)
  inner_channel: 512
  block_num: 6
  group: 4 # same as above
  patch_expansion: 0.5
  channel_expansion: 2
  sp_channel: 128

diffusion_schedule:
  apply_ldm: True
  schedule: linear
  timesteps: 10
  linear_start: 0.1 # 1e-6
  linear_end: 0.99 # 1e-2

# path
path:
  pretrain_network_g: path to DLR_S1 pretrained fusion network checkpoint
  param_key_g: params
  strict_load_g: true

  pretrain_network_sp: path to DLR_S1 pretrained spatial prior encoder checkpoint
  param_key_sp: params
  strict_load_sp: true

  pretrain_network_cp: path to DLR_S1 pretrained channel prior encoder checkpoint
  param_key_cp: params
  strict_load_cp: true

  pretrain_network_dm: path to DLR_S2 pretrained diffusion model checkpoint
  param_key_dm: params
  strict_load_dm: true

  resume_state: ~
    
    
# validation settings
val:
  save_img: True
  suffix: ''
  selfensemble_testing: False
  pbar: True

